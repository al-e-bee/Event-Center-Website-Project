            <ul class="navigation" id="menu">

    <main class="full-gallery">

            </div>

            <div class="large-grid">
                <figure>
                    <img src="https://images.pexels.com/photos/5824829/pexels-photo-5824829.jpeg" alt="Foyer Ceiling">
                    <figcaption>Grand Foyer Ceiling</figcaption>
                </figure>
                
                <figure>
                    <img src="https://images.pexels.com/photos/7428770/pexels-photo-7428770.jpeg" alt="Grand Stairwell">
                    <figcaption>Grand Stairwell</figcaption>
                </figure>

                <figure>
                    <img src="https://images.pexels.com/photos/6039205/pexels-photo-6039205.jpeg" alt="Ballroom">
                    <figcaption>Ballroom - Capacity 350</figcaption>
                </figure>

                 <figure>
                    <img src="https://images.pexels.com/photos/9999094/pexels-photo-9999094.jpeg" alt="Great Hall">
                    <figcaption>Great Hall- Capacity 250</figcaption>
                </figure>


                 <figure>
                    <img src="https://images.pexels.com/photos/3835638/pexels-photo-3835638.jpeg" alt="Outdoor Plaza">
                    <figcaption>Outdoor Plaza - Capacity 450</figcaption>

            </div>

    <footer>
<div class="footer-container">

</div>

    </div>

    <div class="footer-right">
    <button id="backToTop" title="Go to top">
    <i class="fas fa-chevron-up"></i>
</button>
</div>


</div>



</footer>



     <script>
        function toggleMenu(){
            const menu = document.getElementById("menu");
            menu.classList.toggle("active");
        }

        const backToTopBtn = document.getElementById("backToTop");

        window.onscroll = function(){
            if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) {
                backToTopBtn.style.display = "block";
            } else{
                backToTopBtn.style.display = "none";
            }
        };

        backToTopBtn.onclick = function(){
            window.scrollTo({
                top:0,
                behavior: 'smooth'
            });
        }
    </script>

</body>
